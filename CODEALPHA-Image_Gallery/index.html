<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Image Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>My Image Gallery</h1>

    <div class="gallery">
        <img src="images/image1.jpg" alt="Nature Image 1">
        <img src="images/image2.jpg" alt="Nature Image 2">
        <img src="images/image3.jpg" alt="Nature Image 3">
        <img src="images/image4.jpg" alt="Nature Image 4">
        <img src="images/image5.jpg" alt="Nature Image 5">
        <img src="images/image6.jpg" alt="Nature Image 6">
        <img src="images/image7.jpg" alt="Nature Image 7">
        <img src="images/image8.jpg" alt="Nature Image 8">
    </div>

    <!-- Lightbox -->
    <div id="popup">
        <span id="close">&times;</span>

        <img id="popupImage" src="" alt="Large Image">

        <div class="buttons">
            <button id="previous">Previous</button>
            <button id="next">Next</button>
        </div>
    </div>

    <script src="script.js"></script>

    <footer>
    <p>© 2026 My Image Gallery | Created by Saniya Syed</p>
    </footer>   

</body>


</html>
